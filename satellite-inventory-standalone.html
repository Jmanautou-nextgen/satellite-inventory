<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f766e">
  <title>NextGen Satellite Inventory</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    input, button { font-size: 16px; } /* Prevents iOS zoom on focus */
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Product catalog - NextGen Biologics
    const PRODUCT_CATALOG = {
      'FDSD0203': { name: '2x3 Ellipse', size: '2x3', type: 'Ellipse', qty: 1, bu: 4.50 },
      'FDSD0102': { name: '1x2 Ellipse', size: '1x2', type: 'Ellipse', qty: 1, bu: 1.40 },
      'FDSD0103': { name: '1x3 cm Strip', size: '1x3 cm', type: 'Strip', qty: 1, bu: 3.00 },
      'FDSD0020': { name: '20mm Disc', size: '20mm', type: 'Disc', qty: 1, bu: 3.00 },
      'FDSD0015': { name: '15mm Disc', size: '15mm', type: 'Disc', qty: 1, bu: 1.70 },
      'FDSD0010': { name: '10.5mm Disc', size: '10.5mm', type: 'Disc', qty: 1, bu: 0.80 },
      'FSDS0008': { name: '8mm Disc', size: '8mm', type: 'Disc', qty: 1, bu: 0.45 },
      'FSDS0810': { name: '8mm Disc (10-pack)', size: '8mm', type: 'Disc', qty: 10, bu: 4.50 },
    };

    // GTIN to REF mapping - UPDATE WITH YOUR BARCODE GTINs
    const GTIN_TO_REF = {
      // Add your 14-digit GTINs here, e.g.:
      // '30086008106588': 'FDSD0010',
    };

    // Storage helper (uses localStorage)
    const storage = {
      get: (key) => {
        try {
          const val = localStorage.getItem('nextgen_' + key);
          return val ? JSON.parse(val) : null;
        } catch (e) { return null; }
      },
      set: (key, value) => {
        try {
          localStorage.setItem('nextgen_' + key, JSON.stringify(value));
          return true;
        } catch (e) { return false; }
      },
      delete: (key) => {
        try {
          localStorage.removeItem('nextgen_' + key);
          return true;
        } catch (e) { return false; }
      }
    };

    function SatelliteInventory() {
      const [activeTab, setActiveTab] = useState('scan');
      const [inventory, setInventory] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [scanMode, setScanMode] = useState('in');
      const [manualEntry, setManualEntry] = useState({ ref: '', lot: '', exp: '', qty: '1' });
      const [lastScan, setLastScan] = useState(null);
      const [repInfo, setRepInfo] = useState({ name: '', location: '', coords: null });
      const [showSetup, setShowSetup] = useState(true);
      const [cameraActive, setCameraActive] = useState(false);
      const [cameraError, setCameraError] = useState('');
      const [geoStatus, setGeoStatus] = useState('idle');
      const [isLoading, setIsLoading] = useState(true);
      const videoRef = useRef(null);
      const streamRef = useRef(null);
      const detectingRef = useRef(false);

      // Load saved data on mount
      useEffect(() => {
        const savedRep = storage.get('rep-info');
        if (savedRep) {
          setRepInfo(savedRep);
          setShowSetup(false);
        }
        const savedInventory = storage.get('inventory');
        if (savedInventory) setInventory(savedInventory);
        const savedTransactions = storage.get('transactions');
        if (savedTransactions) setTransactions(savedTransactions);
        setIsLoading(false);
      }, []);

      // Save data when it changes
      useEffect(() => {
        if (!isLoading) storage.set('inventory', inventory);
      }, [inventory, isLoading]);

      useEffect(() => {
        if (!isLoading) storage.set('transactions', transactions);
      }, [transactions, isLoading]);

      const saveRepInfo = (info) => storage.set('rep-info', info);

      // Geolocation
      const getGeolocation = () => {
        if (!navigator.geolocation) {
          setGeoStatus('error');
          return;
        }
        setGeoStatus('loading');
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const { latitude, longitude } = position.coords;
            const coords = { lat: latitude, lng: longitude };
            try {
              const response = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`
              );
              const data = await response.json();
              const city = data.address?.city || data.address?.town || data.address?.village || '';
              const state = data.address?.state || '';
              const locationName = city && state ? `${city}, ${state}` : `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
              setRepInfo(prev => ({ ...prev, location: locationName, coords }));
              setGeoStatus('success');
            } catch (e) {
              setRepInfo(prev => ({ ...prev, location: `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`, coords }));
              setGeoStatus('success');
            }
          },
          (error) => {
            console.error('Geolocation error:', error);
            setGeoStatus('error');
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      };

      // Parse GS1-128 barcode
      const parseGS1Barcode = (barcode) => {
        let ref = '', lot = '', exp = '';
        const expMatch = barcode.match(/17(\d{6})/);
        if (expMatch) {
          const d = expMatch[1];
          exp = `20${d.slice(0,2)}-${d.slice(2,4)}-${d.slice(4,6)}`;
        }
        const lotMatch = barcode.match(/10([0-9-]+)/);
        if (lotMatch) lot = lotMatch[1];
        const gtinMatch = barcode.match(/01(\d{14})/);
        if (gtinMatch) {
          ref = GTIN_TO_REF[gtinMatch[1]] || '';
        }
        return { ref, lot, exp };
      };

      // Camera controls
      const startCamera = async () => {
        try {
          setCameraError('');
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
          });
          streamRef.current = stream;
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
          }
          setCameraActive(true);
          detectingRef.current = true;
          if ('BarcodeDetector' in window) {
            detectBarcode();
          } else {
            setCameraError('Barcode detection not supported. Use manual entry.');
          }
        } catch (err) {
          setCameraError('Camera access denied. Please enable in Settings, then refresh.');
          setCameraActive(false);
        }
      };

      const stopCamera = () => {
        detectingRef.current = false;
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(track => track.stop());
          streamRef.current = null;
        }
        setCameraActive(false);
      };

      const detectBarcode = async () => {
        if (!('BarcodeDetector' in window)) return;
        const detector = new window.BarcodeDetector({ formats: ['code_128', 'ean_13', 'qr_code'] });
        const detect = async () => {
          if (videoRef.current && detectingRef.current) {
            try {
              const barcodes = await detector.detect(videoRef.current);
              if (barcodes.length > 0) {
                const parsed = parseGS1Barcode(barcodes[0].rawValue);
                if (parsed.ref || parsed.lot) {
                  setManualEntry(prev => ({ ...prev, ...parsed }));
                  setLastScan({ raw: barcodes[0].rawValue, ...parsed, time: new Date() });
                  // Vibrate on successful scan
                  if (navigator.vibrate) navigator.vibrate(100);
                }
              }
            } catch (e) {}
          }
          if (detectingRef.current) requestAnimationFrame(detect);
        };
        detect();
      };

      useEffect(() => {
        return () => stopCamera();
      }, []);

      // Process scan
      const processScan = () => {
        const { ref, lot, exp, qty } = manualEntry;
        if (!ref || !lot) {
          alert('REF and LOT are required');
          return;
        }
        const quantity = parseInt(qty) || 1;
        const product = PRODUCT_CATALOG[ref] || { name: ref, size: '', type: 'Unknown' };
        const timestamp = new Date().toISOString();
        const transaction = {
          id: Date.now(),
          type: scanMode,
          ref, lot, exp, quantity,
          product: product.name,
          timestamp,
          rep: repInfo.name,
          location: repInfo.location,
          coords: repInfo.coords
        };
        setTransactions(prev => [transaction, ...prev]);
        setInventory(prev => {
          const existing = prev.find(i => i.ref === ref && i.lot === lot);
          if (existing) {
            const newQty = scanMode === 'in' ? existing.quantity + quantity : existing.quantity - quantity;
            if (newQty <= 0) return prev.filter(i => !(i.ref === ref && i.lot === lot));
            return prev.map(i => i.ref === ref && i.lot === lot ? { ...i, quantity: newQty } : i);
          } else if (scanMode === 'in') {
            return [...prev, { ref, lot, exp, quantity, product: product.name }];
          }
          return prev;
        });
        setLastScan({ ...manualEntry, product: product.name, mode: scanMode, time: new Date() });
        setManualEntry({ ref: '', lot: '', exp: '', qty: '1' });
        if (navigator.vibrate) navigator.vibrate(50);
      };

      // Export CSV
      const exportCSV = (type) => {
        let csv = '', data = [], filename = '';
        if (type === 'inventory') {
          csv = 'REF,Product,LOT,Expiration,Quantity,Location,Latitude,Longitude,Rep\n';
          data = inventory.map(i => 
            `${i.ref},${i.product},${i.lot},${i.exp},${i.quantity},${repInfo.location},${repInfo.coords?.lat || ''},${repInfo.coords?.lng || ''},${repInfo.name}`
          );
          filename = `satellite_inventory_${repInfo.name.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.csv`;
        } else {
          csv = 'Timestamp,Type,REF,Product,LOT,Expiration,Quantity,Location,Latitude,Longitude,Rep\n';
          data = transactions.map(t => 
            `${t.timestamp},${t.type.toUpperCase()},${t.ref},${t.product},${t.lot},${t.exp},${t.quantity},${t.location},${t.coords?.lat || ''},${t.coords?.lng || ''},${t.rep}`
          );
          filename = `transactions_${repInfo.name.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.csv`;
        }
        csv += data.join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      // Clear all data
      const clearAllData = () => {
        if (confirm('Clear all saved data? This cannot be undone.')) {
          setInventory([]);
          setTransactions([]);
          setRepInfo({ name: '', location: '', coords: null });
          setShowSetup(true);
          storage.delete('rep-info');
          storage.delete('inventory');
          storage.delete('transactions');
        }
      };

      // Loading
      if (isLoading) {
        return (
          <div className="min-h-screen bg-gradient-to-b from-teal-600 to-teal-800 flex items-center justify-center">
            <div className="text-white text-center">
              <div className="text-2xl mb-2">Loading...</div>
              <div className="text-teal-200">Retrieving saved data</div>
            </div>
          </div>
        );
      }

      // Setup screen
      if (showSetup) {
        return (
          <div className="min-h-screen bg-gradient-to-b from-teal-600 to-teal-800 p-4 flex items-center justify-center">
            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
              <div className="text-center mb-6">
                <div className="text-3xl font-bold text-teal-700">NEXTGEN</div>
                <div className="text-sm text-gray-500 tracking-widest">BIOLOGICS</div>
                <div className="mt-2 text-lg font-semibold text-gray-700">Satellite Inventory</div>
              </div>
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Rep Name</label>
                  <input
                    type="text"
                    value={repInfo.name}
                    onChange={e => setRepInfo(p => ({ ...p, name: e.target.value }))}
                    className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-teal-500 focus:outline-none"
                    placeholder="Your name"
                  />
                  <p className="text-xs text-gray-400 mt-1">Saved automatically for future sessions</p>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Location</label>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      value={repInfo.location}
                      onChange={e => setRepInfo(p => ({ ...p, location: e.target.value }))}
                      className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-teal-500 focus:outline-none"
                      placeholder="City, State"
                    />
                    <button
                      onClick={getGeolocation}
                      disabled={geoStatus === 'loading'}
                      className={`px-4 py-3 rounded-xl font-medium transition-colors ${
                        geoStatus === 'success' ? 'bg-green-100 text-green-700 border-2 border-green-300'
                        : geoStatus === 'error' ? 'bg-red-100 text-red-700 border-2 border-red-300'
                        : 'bg-gray-100 text-gray-700 border-2 border-gray-200'
                      }`}
                    >
                      {geoStatus === 'loading' ? '...' : geoStatus === 'success' ? '✓' : '📍'}
                    </button>
                  </div>
                  {geoStatus === 'success' && repInfo.coords && (
                    <p className="text-xs text-green-600 mt-1">📍 GPS: {repInfo.coords.lat.toFixed(4)}, {repInfo.coords.lng.toFixed(4)}</p>
                  )}
                  {geoStatus === 'error' && (
                    <p className="text-xs text-red-500 mt-1">Location access denied. Enter manually.</p>
                  )}
                </div>
                <button
                  onClick={() => {
                    if (repInfo.name && repInfo.location) {
                      saveRepInfo(repInfo);
                      setShowSetup(false);
                    }
                  }}
                  disabled={!repInfo.name || !repInfo.location}
                  className="w-full py-4 bg-teal-600 text-white font-semibold rounded-xl disabled:bg-gray-300 disabled:cursor-not-allowed hover:bg-teal-700 transition-colors"
                >
                  Start Scanning
                </button>
              </div>
            </div>
          </div>
        );
      }

      // Main app
      return (
        <div className="min-h-screen bg-gray-100 flex flex-col max-w-md mx-auto">
          {/* Header */}
          <div className="bg-teal-700 text-white px-4 py-3">
            <div className="flex justify-between items-center">
              <div className="flex items-center gap-3">
                <button
                  onClick={() => {
                    if (confirm('Log out? Your inventory data will be saved.')) {
                      stopCamera();
                      setShowSetup(true);
                    }
                  }}
                  className="w-8 h-8 rounded-full bg-teal-600 hover:bg-teal-500 flex items-center justify-center text-sm"
                  title="Log out"
                >
                  ←
                </button>
                <div>
                  <div className="font-bold">NEXTGEN Satellite</div>
                  <div className="text-xs text-teal-200 flex items-center gap-1">
                    {repInfo.name} • {repInfo.location}
                    {repInfo.coords && <span className="text-teal-300">📍</span>}
                  </div>
                </div>
              </div>
              <div className="text-right">
                <div className="text-2xl font-bold">{inventory.reduce((s, i) => s + i.quantity, 0)}</div>
                <div className="text-xs text-teal-200">units</div>
              </div>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex bg-white border-b">
            {['scan', 'inventory', 'history', 'export'].map(tab => (
              <button
                key={tab}
                onClick={() => { setActiveTab(tab); if (tab !== 'scan') stopCamera(); }}
                className={`flex-1 py-3 text-sm font-medium capitalize ${
                  activeTab === tab ? 'text-teal-700 border-b-2 border-teal-700' : 'text-gray-500'
                }`}
              >
                {tab}
              </button>
            ))}
          </div>

          {/* Content */}
          <div className="flex-1 overflow-auto">
            {/* SCAN TAB */}
            {activeTab === 'scan' && (
              <div className="p-4 space-y-4">
                <div className="flex rounded-xl overflow-hidden border-2 border-gray-200">
                  <button
                    onClick={() => setScanMode('in')}
                    className={`flex-1 py-3 font-semibold transition-colors ${
                      scanMode === 'in' ? 'bg-green-500 text-white' : 'bg-white text-gray-600'
                    }`}
                  >
                    ↓ SCAN IN
                  </button>
                  <button
                    onClick={() => setScanMode('out')}
                    className={`flex-1 py-3 font-semibold transition-colors ${
                      scanMode === 'out' ? 'bg-orange-500 text-white' : 'bg-white text-gray-600'
                    }`}
                  >
                    ↑ SCAN OUT
                  </button>
                </div>

                <div className="bg-black rounded-xl overflow-hidden relative">
                  {cameraActive ? (
                    <video ref={videoRef} autoPlay playsInline className="w-full h-48 object-cover" />
                  ) : (
                    <div className="h-48 flex items-center justify-center">
                      <button onClick={startCamera} className="px-6 py-3 bg-teal-600 text-white rounded-lg font-medium">
                        📷 Start Camera
                      </button>
                    </div>
                  )}
                  {cameraActive && (
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                      <div className="w-3/4 h-16 border-2 border-teal-400 rounded-lg" />
                    </div>
                  )}
                </div>
                {cameraError && <p className="text-sm text-red-500 text-center">{cameraError}</p>}

                <div className="bg-white rounded-xl p-4 space-y-3">
                  <div className="text-sm font-medium text-gray-500">Manual Entry / Edit</div>
                  <div className="grid grid-cols-2 gap-3">
                    <input
                      type="text"
                      placeholder="REF (e.g., FDSD0010)"
                      value={manualEntry.ref}
                      onChange={e => setManualEntry(p => ({ ...p, ref: e.target.value.toUpperCase() }))}
                      className="col-span-2 px-3 py-2 border rounded-lg text-sm"
                    />
                    <input
                      type="text"
                      placeholder="LOT"
                      value={manualEntry.lot}
                      onChange={e => setManualEntry(p => ({ ...p, lot: e.target.value }))}
                      className="px-3 py-2 border rounded-lg text-sm"
                    />
                    <input
                      type="date"
                      placeholder="EXP"
                      value={manualEntry.exp}
                      onChange={e => setManualEntry(p => ({ ...p, exp: e.target.value }))}
                      className="px-3 py-2 border rounded-lg text-sm"
                    />
                    <input
                      type="number"
                      min="1"
                      placeholder="QTY"
                      value={manualEntry.qty}
                      onChange={e => setManualEntry(p => ({ ...p, qty: e.target.value }))}
                      className="px-3 py-2 border rounded-lg text-sm"
                    />
                    <button
                      onClick={processScan}
                      className={`py-2 rounded-lg font-semibold text-white ${
                        scanMode === 'in' ? 'bg-green-500' : 'bg-orange-500'
                      }`}
                    >
                      {scanMode === 'in' ? '+ Add' : '- Remove'}
                    </button>
                  </div>
                </div>

                {lastScan && (
                  <div className={`rounded-xl p-4 ${
                    lastScan.mode === 'in' ? 'bg-green-50 border border-green-200' : 'bg-orange-50 border border-orange-200'
                  }`}>
                    <div className="text-sm font-medium text-gray-500">Last Scan</div>
                    <div className="font-semibold">{lastScan.product || lastScan.ref}</div>
                    <div className="text-sm text-gray-600">LOT: {lastScan.lot}</div>
                  </div>
                )}
              </div>
            )}

            {/* INVENTORY TAB */}
            {activeTab === 'inventory' && (
              <div className="p-4">
                {inventory.length === 0 ? (
                  <div className="text-center py-12 text-gray-400">
                    <div className="text-4xl mb-2">📦</div>
                    <div>No inventory yet</div>
                    <div className="text-sm">Scan items to add them</div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {inventory.map((item, i) => (
                      <div key={i} className="bg-white rounded-xl p-4 shadow-sm">
                        <div className="flex justify-between items-start">
                          <div>
                            <div className="font-semibold text-gray-800">{item.product}</div>
                            <div className="text-sm text-gray-500">REF: {item.ref}</div>
                            <div className="text-sm text-gray-500">LOT: {item.lot}</div>
                            {item.exp && <div className="text-sm text-gray-400">EXP: {item.exp}</div>}
                          </div>
                          <div className="text-right">
                            <div className="text-2xl font-bold text-teal-700">{item.quantity}</div>
                            <div className="text-xs text-gray-400">units</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* HISTORY TAB */}
            {activeTab === 'history' && (
              <div className="p-4">
                {transactions.length === 0 ? (
                  <div className="text-center py-12 text-gray-400">
                    <div className="text-4xl mb-2">📋</div>
                    <div>No transactions yet</div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {transactions.map(t => (
                      <div key={t.id} className="bg-white rounded-xl p-3 shadow-sm flex items-center gap-3">
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold ${
                          t.type === 'in' ? 'bg-green-500' : 'bg-orange-500'
                        }`}>
                          {t.type === 'in' ? '↓' : '↑'}
                        </div>
                        <div className="flex-1">
                          <div className="font-medium text-sm">{t.product}</div>
                          <div className="text-xs text-gray-500">LOT: {t.lot}</div>
                          {t.coords && <div className="text-xs text-gray-400">📍 {t.location}</div>}
                        </div>
                        <div className="text-right">
                          <div className="font-semibold">{t.type === 'in' ? '+' : '-'}{t.quantity}</div>
                          <div className="text-xs text-gray-400">
                            {new Date(t.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* EXPORT TAB */}
            {activeTab === 'export' && (
              <div className="p-4 space-y-4">
                <div className="bg-white rounded-xl p-6 text-center">
                  <div className="text-4xl mb-2">📤</div>
                  <div className="font-semibold mb-1">Export Current Inventory</div>
                  <div className="text-sm text-gray-500 mb-4">{inventory.length} items, {inventory.reduce((s, i) => s + i.quantity, 0)} total units</div>
                  <button
                    onClick={() => exportCSV('inventory')}
                    disabled={inventory.length === 0}
                    className="w-full py-3 bg-teal-600 text-white rounded-xl font-semibold disabled:bg-gray-300"
                  >
                    Download Inventory CSV
                  </button>
                </div>
                <div className="bg-white rounded-xl p-6 text-center">
                  <div className="text-4xl mb-2">📝</div>
                  <div className="font-semibold mb-1">Export Transaction Log</div>
                  <div className="text-sm text-gray-500 mb-4">{transactions.length} transactions</div>
                  <button
                    onClick={() => exportCSV('transactions')}
                    disabled={transactions.length === 0}
                    className="w-full py-3 bg-gray-700 text-white rounded-xl font-semibold disabled:bg-gray-300"
                  >
                    Download Transactions CSV
                  </button>
                </div>
                <div className="bg-white rounded-xl p-6 text-center">
                  <div className="text-4xl mb-2">⚙️</div>
                  <div className="font-semibold mb-1">Settings</div>
                  <div className="text-sm text-gray-500 mb-4">
                    Logged in as: {repInfo.name}<br/>
                    {repInfo.coords && `GPS: ${repInfo.coords.lat.toFixed(4)}, ${repInfo.coords.lng.toFixed(4)}`}
                  </div>
                  <button
                    onClick={() => setShowSetup(true)}
                    className="w-full py-3 bg-gray-200 text-gray-700 rounded-xl font-semibold mb-2"
                  >
                    Change Rep / Location
                  </button>
                  <button
                    onClick={clearAllData}
                    className="w-full py-3 bg-red-100 text-red-700 rounded-xl font-semibold"
                  >
                    Clear All Data
                  </button>
                </div>
                <div className="text-center text-sm text-gray-400 mt-6">
                  Import CSV files into your master<br/>Excel workbook to sync data
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<SatelliteInventory />, document.getElementById('root'));
  </script>
</body>
</html>
