<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f766e">
  <title>NextGen Satellite Inventory</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    input, button { font-size: 16px; }
    #qr-reader { width: 100%; border-radius: 12px; overflow: hidden; }
    #qr-reader video { border-radius: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PRODUCT_CATALOG = {
      'FDSD0203': { name: '2x3 Ellipse', size: '2x3', type: 'Ellipse', qty: 1, bu: 4.50 },
      'FDSD0102': { name: '1x2 Ellipse', size: '1x2', type: 'Ellipse', qty: 1, bu: 1.40 },
      'FDSD0103': { name: '1x3 cm Strip', size: '1x3 cm', type: 'Strip', qty: 1, bu: 3.00 },
      'FDSD0020': { name: '20mm Disc', size: '20mm', type: 'Disc', qty: 1, bu: 3.00 },
      'FDSD0015': { name: '15mm Disc', size: '15mm', type: 'Disc', qty: 1, bu: 1.70 },
      'FDSD0010': { name: '10.5mm Disc', size: '10.5mm', type: 'Disc', qty: 1, bu: 0.80 },
      'FSDS0008': { name: '8mm Disc', size: '8mm', type: 'Disc', qty: 1, bu: 0.45 },
      'FSDS0810': { name: '8mm Disc (10-pack)', size: '8mm', type: 'Disc', qty: 10, bu: 4.50 },
    };

    const GTIN_TO_REF = {};

    const storage = {
      get: (k) => { try { const v = localStorage.getItem('nextgen_' + k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem('nextgen_' + k, JSON.stringify(v)); } catch {} },
      del: (k) => { try { localStorage.removeItem('nextgen_' + k); } catch {} }
    };

    function App() {
      const [tab, setTab] = useState('scan');
      const [inv, setInv] = useState([]);
      const [txns, setTxns] = useState([]);
      const [mode, setMode] = useState('in');
      const [entry, setEntry] = useState({ ref: '', lot: '', exp: '', qty: '1' });
      const [last, setLast] = useState(null);
      const [rep, setRep] = useState({ name: '', location: '', coords: null });
      const [setup, setSetup] = useState(true);
      const [camOn, setCamOn] = useState(false);
      const [camErr, setCamErr] = useState('');
      const [geo, setGeo] = useState('idle');
      const [loading, setLoading] = useState(true);
      const scannerRef = useRef(null);

      useEffect(() => {
        const r = storage.get('rep'); if (r) { setRep(r); setSetup(false); }
        const i = storage.get('inv'); if (i) setInv(i);
        const t = storage.get('txns'); if (t) setTxns(t);
        setLoading(false);
      }, []);

      useEffect(() => { if (!loading) storage.set('inv', inv); }, [inv, loading]);
      useEffect(() => { if (!loading) storage.set('txns', txns); }, [txns, loading]);

      const parseBarcode = (bc) => {
        let ref = '', lot = '', exp = '';
        const expM = bc.match(/17(\d{6})/);
        if (expM) { const d = expM[1]; exp = `20${d.slice(0,2)}-${d.slice(2,4)}-${d.slice(4,6)}`; }
        const lotM = bc.match(/10([A-Za-z0-9-]+?)(?=17|10|21|$)/);
        if (lotM) lot = lotM[1];
        const gtinM = bc.match(/01(\d{14})/);
        if (gtinM) ref = GTIN_TO_REF[gtinM[1]] || '';
        return { ref, lot, exp };
      };

      const startCam = async () => {
        setCamErr('');
        try {
          const scanner = new Html5Qrcode("qr-reader");
          scannerRef.current = scanner;
          await scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 100 } },
            (text) => {
              const p = parseBarcode(text);
              if (p.ref || p.lot) {
                setEntry(prev => ({ ...prev, ...p }));
                setLast({ raw: text, ...p, time: new Date() });
                if (navigator.vibrate) navigator.vibrate(100);
              }
            },
            () => {}
          );
          setCamOn(true);
        } catch (e) {
          setCamErr('Camera error: ' + (e.message || 'Access denied'));
        }
      };

      const stopCam = async () => {
        if (scannerRef.current) {
          try { await scannerRef.current.stop(); } catch {}
          scannerRef.current = null;
        }
        setCamOn(false);
      };

      useEffect(() => { return () => { stopCam(); }; }, []);

      const getGeo = () => {
        if (!navigator.geolocation) { setGeo('error'); return; }
        setGeo('loading');
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const { latitude: lat, longitude: lng } = pos.coords;
            const coords = { lat, lng };
            try {
              const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
              const d = await res.json();
              const city = d.address?.city || d.address?.town || d.address?.village || '';
              const state = d.address?.state || '';
              const loc = city && state ? `${city}, ${state}` : `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
              setRep(p => ({ ...p, location: loc, coords }));
            } catch {
              setRep(p => ({ ...p, location: `${lat.toFixed(4)}, ${lng.toFixed(4)}`, coords }));
            }
            setGeo('success');
          },
          () => setGeo('error'),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      };

      const doScan = () => {
        const { ref, lot, exp, qty } = entry;
        if (!ref || !lot) { alert('REF and LOT required'); return; }
        const q = parseInt(qty) || 1;
        const prod = PRODUCT_CATALOG[ref] || { name: ref };
        const txn = { id: Date.now(), type: mode, ref, lot, exp, quantity: q, product: prod.name, timestamp: new Date().toISOString(), rep: rep.name, location: rep.location, coords: rep.coords };
        setTxns(p => [txn, ...p]);
        setInv(p => {
          const ex = p.find(i => i.ref === ref && i.lot === lot);
          if (ex) {
            const nq = mode === 'in' ? ex.quantity + q : ex.quantity - q;
            if (nq <= 0) return p.filter(i => !(i.ref === ref && i.lot === lot));
            return p.map(i => i.ref === ref && i.lot === lot ? { ...i, quantity: nq } : i);
          } else if (mode === 'in') {
            return [...p, { ref, lot, exp, quantity: q, product: prod.name }];
          }
          return p;
        });
        setLast({ ...entry, product: prod.name, mode, time: new Date() });
        setEntry({ ref: '', lot: '', exp: '', qty: '1' });
        if (navigator.vibrate) navigator.vibrate(50);
      };

      const exportCSV = (type) => {
        let csv, fn;
        if (type === 'inv') {
          csv = 'REF,Product,LOT,Exp,Qty,Location,Lat,Lng,Rep\n' + inv.map(i => `${i.ref},${i.product},${i.lot},${i.exp},${i.quantity},${rep.location},${rep.coords?.lat||''},${rep.coords?.lng||''},${rep.name}`).join('\n');
          fn = `inventory_${rep.name.replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.csv`;
        } else {
          csv = 'Time,Type,REF,Product,LOT,Exp,Qty,Location,Lat,Lng,Rep\n' + txns.map(t => `${t.timestamp},${t.type.toUpperCase()},${t.ref},${t.product},${t.lot},${t.exp},${t.quantity},${t.location},${t.coords?.lat||''},${t.coords?.lng||''},${t.rep}`).join('\n');
          fn = `transactions_${rep.name.replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.csv`;
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = fn;
        a.click();
      };

      const clearAll = () => {
        if (confirm('Clear all data?')) {
          setInv([]); setTxns([]); setRep({ name: '', location: '', coords: null }); setSetup(true);
          storage.del('rep'); storage.del('inv'); storage.del('txns');
        }
      };

      if (loading) return <div className="min-h-screen bg-teal-700 flex items-center justify-center text-white text-xl">Loading...</div>;

      if (setup) return (
        <div className="min-h-screen bg-gradient-to-b from-teal-600 to-teal-800 p-4 flex items-center justify-center">
          <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
            <div className="text-center mb-6">
              <div className="text-3xl font-bold text-teal-700">NEXTGEN</div>
              <div className="text-sm text-gray-500 tracking-widest">BIOLOGICS</div>
              <div className="mt-2 text-lg font-semibold text-gray-700">Satellite Inventory</div>
            </div>
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Rep Name</label>
                <input type="text" value={rep.name} onChange={e => setRep(p => ({ ...p, name: e.target.value }))} className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl" placeholder="Your name" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Location</label>
                <div className="flex gap-2">
                  <input type="text" value={rep.location} onChange={e => setRep(p => ({ ...p, location: e.target.value }))} className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl" placeholder="City, State" />
                  <button onClick={getGeo} disabled={geo==='loading'} className={`px-4 py-3 rounded-xl font-medium ${geo==='success'?'bg-green-100 text-green-700 border-2 border-green-300':geo==='error'?'bg-red-100 text-red-700 border-2 border-red-300':'bg-gray-100 text-gray-700 border-2 border-gray-200'}`}>
                    {geo==='loading'?'...':geo==='success'?'✓':'📍'}
                  </button>
                </div>
                {geo==='success' && rep.coords && <p className="text-xs text-green-600 mt-1">📍 {rep.coords.lat.toFixed(4)}, {rep.coords.lng.toFixed(4)}</p>}
              </div>
              <button onClick={() => { if (rep.name && rep.location) { storage.set('rep', rep); setSetup(false); }}} disabled={!rep.name || !rep.location} className="w-full py-4 bg-teal-600 text-white font-semibold rounded-xl disabled:bg-gray-300">Start Scanning</button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-100 flex flex-col max-w-md mx-auto">
          <div className="bg-teal-700 text-white px-4 py-3">
            <div className="flex justify-between items-center">
              <div className="flex items-center gap-3">
                <button onClick={() => { if (confirm('Log out?')) { stopCam(); setSetup(true); }}} className="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center">←</button>
                <div>
                  <div className="font-bold">NEXTGEN Satellite</div>
                  <div className="text-xs text-teal-200">{rep.name} • {rep.location} {rep.coords && '📍'}</div>
                </div>
              </div>
              <div className="text-right">
                <div className="text-2xl font-bold">{inv.reduce((s,i) => s + i.quantity, 0)}</div>
                <div className="text-xs text-teal-200">units</div>
              </div>
            </div>
          </div>

          <div className="flex bg-white border-b">
            {['scan','inventory','history','export'].map(t => (
              <button key={t} onClick={() => { setTab(t); if (t !== 'scan') stopCam(); }} className={`flex-1 py-3 text-sm font-medium capitalize ${tab===t?'text-teal-700 border-b-2 border-teal-700':'text-gray-500'}`}>{t}</button>
            ))}
          </div>

          <div className="flex-1 overflow-auto">
            {tab === 'scan' && (
              <div className="p-4 space-y-4">
                <div className="flex rounded-xl overflow-hidden border-2 border-gray-200">
                  <button onClick={() => setMode('in')} className={`flex-1 py-3 font-semibold ${mode==='in'?'bg-green-500 text-white':'bg-white text-gray-600'}`}>↓ SCAN IN</button>
                  <button onClick={() => setMode('out')} className={`flex-1 py-3 font-semibold ${mode==='out'?'bg-orange-500 text-white':'bg-white text-gray-600'}`}>↑ SCAN OUT</button>
                </div>

                <div className="bg-black rounded-xl overflow-hidden">
                  {camOn ? (
                    <div>
                      <div id="qr-reader"></div>
                      <button onClick={stopCam} className="w-full py-2 bg-red-600 text-white font-medium">Stop Camera</button>
                    </div>
                  ) : (
                    <div className="h-48 flex items-center justify-center">
                      <button onClick={startCam} className="px-6 py-3 bg-teal-600 text-white rounded-lg font-medium">📷 Start Camera</button>
                    </div>
                  )}
                </div>
                {camErr && <p className="text-sm text-red-500 text-center">{camErr}</p>}

                <div className="bg-white rounded-xl p-4 space-y-3">
                  <div className="text-sm font-medium text-gray-500">Manual Entry / Edit</div>
                  <div className="grid grid-cols-2 gap-3">
                    <input type="text" placeholder="REF (e.g., FDSD0010)" value={entry.ref} onChange={e => setEntry(p => ({ ...p, ref: e.target.value.toUpperCase() }))} className="col-span-2 px-3 py-2 border rounded-lg text-sm" />
                    <input type="text" placeholder="LOT" value={entry.lot} onChange={e => setEntry(p => ({ ...p, lot: e.target.value }))} className="px-3 py-2 border rounded-lg text-sm" />
                    <input type="date" value={entry.exp} onChange={e => setEntry(p => ({ ...p, exp: e.target.value }))} className="px-3 py-2 border rounded-lg text-sm" />
                    <input type="number" min="1" value={entry.qty} onChange={e => setEntry(p => ({ ...p, qty: e.target.value }))} className="px-3 py-2 border rounded-lg text-sm" />
                    <button onClick={doScan} className={`py-2 rounded-lg font-semibold text-white ${mode==='in'?'bg-green-500':'bg-orange-500'}`}>{mode==='in'?'+ Add':'- Remove'}</button>
                  </div>
                </div>

                {last && (
                  <div className={`rounded-xl p-4 ${last.mode==='in'?'bg-green-50 border border-green-200':'bg-orange-50 border border-orange-200'}`}>
                    <div className="text-sm font-medium text-gray-500">Last Scan</div>
                    <div className="font-semibold">{last.product || last.ref}</div>
                    <div className="text-sm text-gray-600">LOT: {last.lot}</div>
                  </div>
                )}
              </div>
            )}

            {tab === 'inventory' && (
              <div className="p-4">
                {inv.length === 0 ? (
                  <div className="text-center py-12 text-gray-400">
                    <div className="text-4xl mb-2">📦</div>
                    <div>No inventory yet</div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {inv.map((item, i) => (
                      <div key={i} className="bg-white rounded-xl p-4 shadow-sm flex justify-between">
                        <div>
                          <div className="font-semibold">{item.product}</div>
                          <div className="text-sm text-gray-500">REF: {item.ref}</div>
                          <div className="text-sm text-gray-500">LOT: {item.lot}</div>
                          {item.exp && <div className="text-sm text-gray-400">EXP: {item.exp}</div>}
                        </div>
                        <div className="text-right">
                          <div className="text-2xl font-bold text-teal-700">{item.quantity}</div>
                          <div className="text-xs text-gray-400">units</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {tab === 'history' && (
              <div className="p-4">
                {txns.length === 0 ? (
                  <div className="text-center py-12 text-gray-400">
                    <div className="text-4xl mb-2">📋</div>
                    <div>No transactions yet</div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {txns.map(t => (
                      <div key={t.id} className="bg-white rounded-xl p-3 shadow-sm flex items-center gap-3">
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold ${t.type==='in'?'bg-green-500':'bg-orange-500'}`}>{t.type==='in'?'↓':'↑'}</div>
                        <div className="flex-1">
                          <div className="font-medium text-sm">{t.product}</div>
                          <div className="text-xs text-gray-500">LOT: {t.lot}</div>
                        </div>
                        <div className="text-right">
                          <div className="font-semibold">{t.type==='in'?'+':'-'}{t.quantity}</div>
                          <div className="text-xs text-gray-400">{new Date(t.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {tab === 'export' && (
              <div className="p-4 space-y-4">
                <div className="bg-white rounded-xl p-6 text-center">
                  <div className="text-4xl mb-2">📤</div>
                  <div className="font-semibold mb-1">Export Inventory</div>
                  <div className="text-sm text-gray-500 mb-4">{inv.length} items, {inv.reduce((s,i)=>s+i.quantity,0)} units</div>
                  <button onClick={() => exportCSV('inv')} disabled={inv.length===0} className="w-full py-3 bg-teal-600 text-white rounded-xl font-semibold disabled:bg-gray-300">Download CSV</button>
                </div>
                <div className="bg-white rounded-xl p-6 text-center">
                  <div className="text-4xl mb-2">📝</div>
                  <div className="font-semibold mb-1">Export Transactions</div>
                  <div className="text-sm text-gray-500 mb-4">{txns.length} transactions</div>
                  <button onClick={() => exportCSV('txns')} disabled={txns.length===0} className="w-full py-3 bg-gray-700 text-white rounded-xl font-semibold disabled:bg-gray-300">Download CSV</button>
                </div>
                <div className="bg-white rounded-xl p-6 text-center">
                  <div className="text-4xl mb-2">⚙️</div>
                  <div className="font-semibold mb-1">Settings</div>
                  <div className="text-sm text-gray-500 mb-4">Logged in as: {rep.name}</div>
                  <button onClick={() => setSetup(true)} className="w-full py-3 bg-gray-200 text-gray-700 rounded-xl font-semibold mb-2">Change Rep</button>
                  <button onClick={clearAll} className="w-full py-3 bg-red-100 text-red-700 rounded-xl font-semibold">Clear All Data</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
